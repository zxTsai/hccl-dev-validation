name: broadcast_2p_small
category: primitives
op: Broadcast
rank_size: 2
dtype: fp32
count: 4096
scale: small
backend: hccl_vm
enabled: true
backend_config:
  case_config: case_configs/primitives/broadcast_2p_small_vm.json
  timeout_sec: 180
expect:
  returncode: 0
  required_log_patterns:
  - rank ready, start runner
  - Plugin [runner] exited successfully
  - Shell exited. Host shutting down
  - 'check_result:'
  - success
  forbidden_log_patterns:
  - '[ERROR]'
  - execute failed
  - 'RESULT: FAILED'
  - Segmentation fault
  - core dumped
  - comm is nullptr
notes:
  method: Run HCCL-VM ascend950 topology with mock-comm 112; execute mpirun -np 2
    broadcast_test for Broadcast 2 rank small validation using dtype=fp32 and count=4096.
  expected_behavior: All ranks enter the runner, hccl_test completes, check_result
    is printed, and the result line is success.
  check_method: 'Require returncode 0 plus runner lifecycle markers and hccl_test
    check_result success; reject [ERROR], execute failed, RESULT: FAILED, Segmentation
    fault, core dumped, and comm is nullptr.'
  reason: ''
